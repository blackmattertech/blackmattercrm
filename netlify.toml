# BlackMatter CRM – Netlify (frontend only)
# Backend (Express) must be deployed elsewhere (e.g. Render, Railway).

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Local dev: run "netlify dev" from repo root – starts both frontend (Vite) and backend (Express)
[dev]
  command = "npm run dev"
  port    = 8888
  targetPort = 5173

# SPA: serve index.html for all routes (if you add URL-based routing later)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200
